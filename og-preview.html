<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOODCHANGER.AI - OG Image Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0d2430 0%, #1a3441 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        
        .og-container {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0d2430 0%, #1a3441 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 60px;
            box-sizing: border-box;
        }
        
        .logo {
            width: 200px;
            height: 200px;
            margin-bottom: 40px;
            filter: brightness(0) saturate(100%) invert(64%) sepia(14%) saturate(1465%) hue-rotate(126deg) brightness(91%) contrast(87%);
        }
        
        .title {
            font-size: 72px;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: -2px;
        }
        
        .subtitle {
            font-size: 28px;
            color: #2aa68a;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .description {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            max-width: 600px;
            line-height: 1.4;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .accent-line {
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, #2aa68a 0%, #34d399 100%);
            margin: 20px auto;
            border-radius: 2px;
            box-shadow: 0 2px 8px rgba(42, 166, 138, 0.4);
        }
        
        .flomad-branding {
            position: absolute;
            bottom: 40px;
            right: 60px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }
        
        /* Subtle background pattern */
        .og-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(42, 166, 138, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(42, 166, 138, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="og-container">
        <img src="flomadlogo.svg" alt="Flomad Labs Logo" class="logo">
        <h1 class="title">MOODCHANGER.AI</h1>
        <div class="accent-line"></div>
        <p class="subtitle">Transforming your mood, one insight at a time</p>
        <p class="description">AI-powered mood transformation technology from Flomad Labs</p>
    </div>
</body>
</html>
