<svg width="150" height="150" viewBox="0 0 150 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Yellow hand/wave logo -->
  <g fill="#FDE035">
    <!-- Finger 1 (leftmost) -->
    <rect x="30" y="15" width="12" height="55" rx="6" transform="rotate(-15 36 42.5)"/>
    
    <!-- Finger 2 -->
    <rect x="52" y="8" width="12" height="60" rx="6" transform="rotate(-5 58 38)"/>
    
    <!-- Finger 3 (middle) -->
    <rect x="74" y="5" width="12" height="65" rx="6"/>
    
    <!-- Finger 4 -->
    <rect x="96" y="8" width="12" height="60" rx="6" transform="rotate(5 102 38)"/>
    
    <!-- Finger 5 (rightmost) -->
    <rect x="118" y="15" width="12" height="55" rx="6" transform="rotate(15 124 42.5)"/>
    
    <!-- Palm/base (curved sections) -->
    <path d="M 25 60 Q 20 65 20 75 L 20 95 Q 20 105 30 105 L 50 105 Q 60 105 60 95 L 60 70" fill="#FDE035"/>
    <path d="M 55 70 L 55 95 Q 55 105 65 105 L 85 105 Q 95 105 95 95 L 95 70" fill="#FDE035"/>
    <path d="M 90 70 L 90 95 Q 90 105 100 105 L 120 105 Q 130 105 130 95 L 130 75 Q 130 65 125 60" fill="#FDE035"/>
    
    <!-- Wrist stripes -->
    <rect x="15" y="110" width="120" height="8" rx="4" fill="#FDE035"/>
    <rect x="20" y="125" width="110" height="8" rx="4" fill="#FDE035"/>
    <rect x="25" y="140" width="100" height="8" rx="4" fill="#FDE035"/>
  </g>
</svg>
